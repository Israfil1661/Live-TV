<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Live TV</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#0b1120;
background:
radial-gradient(circle at 20% 20%,#2dd4bf22,transparent 35%),
radial-gradient(circle at 80% 80%,#2563eb22,transparent 35%),
linear-gradient(135deg,#0b1120,#121b30,#0b1120);
}

.bg{
position:fixed;
inset:0;
overflow:hidden;
}

.bg span{
position:absolute;
border-radius:50%;
background:#4cc9ff22;
animation:float 12s linear infinite;
filter:blur(2px);
}

.bg span:nth-child(1){width:220px;height:220px;left:-60px;top:15%;}
.bg span:nth-child(2){width:160px;height:160px;right:-40px;top:65%;animation-duration:15s;}
.bg span:nth-child(3){width:90px;height:90px;left:70%;top:5%;animation-duration:9s;}
.bg span:nth-child(4){width:120px;height:120px;left:15%;bottom:5%;animation-duration:18s;}

@keyframes float{
0%{transform:translateY(0) rotate(0);}
50%{transform:translateY(-40px) rotate(180deg);}
100%{transform:translateY(0) rotate(360deg);}
}

.card{
position:relative;
width:92%;
max-width:390px;
padding:40px 25px;
border-radius:35px;
background:rgba(17,24,39,.75);
backdrop-filter:blur(25px);
box-shadow:
-12px -12px 24px rgba(255,255,255,.04),
12px 12px 30px rgba(0,0,0,.55),
inset -2px -2px 6px rgba(255,255,255,.05),
inset 2px 2px 6px rgba(0,0,0,.4);
text-align:center;
animation:zoom 1s ease;
}

@keyframes zoom{
from{opacity:0;transform:scale(.85);}
to{opacity:1;transform:scale(1);}
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:linear-gradient(145deg,#00d4ff,#2563eb);
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
box-shadow:0 0 40px #00c8ff99;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.08);
box-shadow:0 0 60px #00d4ff;
}
}

h1{
margin:25px 0 10px;
color:#fff;
font-size:30px;
letter-spacing:2px;
}

p{
color:#b8c3d6;
font-size:15px;
margin-bottom:35px;
}

.button{
display:block;
text-decoration:none;
padding:18px;
border-radius:20px;
font-size:20px;
font-weight:700;
color:#fff;
background:linear-gradient(135deg,#00d4ff,#2563eb);
box-shadow:
0 10px 30px rgba(37,99,235,.45),
inset 0 1px 2px rgba(255,255,255,.4);
transition:.35s;
}

.button:hover,
.button:active{
transform:translateY(-4px) scale(1.03);
box-shadow:0 15px 40px rgba(0,212,255,.7);
}

.footer{
margin-top:28px;
color:#7e8da5;
font-size:12px;
letter-spacing:1px;
}

.scan{
position:absolute;
left:0;
top:0;
width:100%;
height:3px;
background:linear-gradient(90deg,transparent,#00e5ff,transparent);
animation:scan 3s linear infinite;
}

@keyframes scan{
0%{top:0;}
100%{top:100%;}
}
</style>
</head>

<body>

<div class="bg">
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="card">

<div class="scan"></div>

<div class="logo">📺</div>

<h1>Live TV</h1>

<p>Watch Live Channels Anytime, Anywhere</p>
<a class="button"
href="https://script.google.com/macros/s/AKfycbzeJGZG3gygJrLN9oEJ2LyZvyDiNkogulqylyT0QvyxrsJoAVxmYp8uksom5mx-bxu-Sg/exec?ISCI=011102">
WELCOME
</a>

<div class="footer">
Unlimited Entertainment • 24/7
</div>

</div>

</body>
</html>
