        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  FULLSCREEN (settings)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        settingsFullscreenBtn.addEventListener('click', () => {
            playClick();
            animatePress(settingsFullscreenBtn);
            toggleFullscreen();
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  PARSE M3U8
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function parseM3U8(content) {
            const lines = content.split(/\r?\n/);
            const result = [];
            let extinfBuffer = null;
            for (const raw of lines) {
                const line = raw.trim();
                if (!line) continue;
                if (line.startsWith('#EXTM3U') || line.startsWith('#EXT-X-')) continue;
                if (line.startsWith('#EXTINF:')) { extinfBuffer = line; continue; }
                if (extinfBuffer && line && !line.startsWith('#')) {
                    const ch = parseExtinf(extinfBuffer);
                    if (ch && line) {
                        result.push({ id: result.length, name: ch.name || 'চ্যানেল', icon: ch.icon || '📺', url: line });
                    }
                    extinfBuffer = null;
                    continue;
                }
                if (!extinfBuffer && line && !line.startsWith('#')) {
                    const url = line;
                    const name = url.split('/').pop() || 'চ্যানেল';
                    result.push({ id: result.length, name, icon: '📺', url });
                }
            }
            if (extinfBuffer) {
                const ch = parseExtinf(extinfBuffer);
                if (ch && ch.name) result.push({ id: result.length, name: ch.name, icon: ch.icon || '📺', url: '' });
            }
            return result;
        }

        function parseExtinf(line) {
            let name = 'চ্যানেল',
                icon = '📺';
            const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
            if (logoMatch) { const l = logoMatch[1].trim(); if (l) icon = l; }
            const parts = line.split(',');
            if (parts.length > 1) { const n = parts.slice(1).join(',').trim(); if (n) name = n; } else {
                const nm = line.match(/tvg-name="([^"]*)"/i);
                if (nm && nm[1].trim()) name = nm[1].trim();
            }
            if (icon && !icon.startsWith('http') && !icon.startsWith('data:')) icon = '📺';
            return { name, icon };
        }

        function prioritizeBtv(list) {
            const btvIndex = list.findIndex(ch => ch.name && ch.name.toLowerCase().includes('btv'));
            if (btvIndex > 0) { const btv = list.splice(btvIndex, 1)[0];
                list.unshift(btv); }
            return list;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  FETCH PLAYLIST
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function fetchPlaylistWithTimeout(url, timeout = 10000) {
            return Promise.race([
                fetch(url, { cache: 'no-cache' }),
                new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), timeout))
            ]);
        }

        async function fetchPlaylist() {
            if (isFetching) return;
            isFetching = true;
            fetchOverlay.classList.add('visible');
            fetchErrorOverlay.classList.remove('visible');
            loadingOverlay.classList.remove('visible');
            errorOverlay.classList.remove('visible');

            try {
                const resp = await fetchPlaylistWithTimeout(PLAYLIST_URL, 10000);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const text = await resp.text();
                let parsed = parseM3U8(text);
                if (!parsed.length) throw new Error('প্লেলিস্ট খালি');
                parsed = prioritizeBtv(parsed);
                channels = parsed;
                fetchOverlay.classList.remove('visible');
                isFetching = false;
                if (channels.length) {
                    const defaultIndex = (DEFAULT_CHANNEL_INDEX < channels.length) ? DEFAULT_CHANNEL_INDEX : 0;
                    loadChannel(defaultIndex);
                    renderSidebar();
                } else {
                    showToast('❌ চ্যানেল নেই');
                }
            } catch (err) {
                console.error(err);
                fetchOverlay.classList.remove('visible');
                fetchErrorOverlay.classList.add('visible');
                isFetching = false;
            }
        }

        function useFallbackChannels() {
            fetchErrorOverlay.classList.remove('visible');
            fetchOverlay.classList.remove('visible');
            channels = FALLBACK_CHANNELS.map((ch, idx) => ({ ...ch, id: idx }));
            if (channels.length) {
                const defaultIndex = (DEFAULT_CHANNEL_INDEX < channels.length) ? DEFAULT_CHANNEL_INDEX : 0;
                loadChannel(defaultIndex);
                renderSidebar();
                showToast(`📡 ডিফল্ট (${channels.length}টি)`);
            } else {
                showToast('❌ চ্যানেল নেই');
            }
        }

        fetchRetryBtn.addEventListener('click', () => {
            playClick();
            animatePress(fetchRetryBtn);
            fetchPlaylist();
        });
        useDefaultBtn.addEventListener('click', () => {
            playClick();
            animatePress(useDefaultBtn);
            useFallbackChannels();
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  KEYBOARD SHORTCUTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); return; }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (video.paused) { video.play();
                    settingsPlayPauseBtn.textContent = '⏸'; } else { video.pause();
                    settingsPlayPauseBtn.textContent = '▶️'; }
                return;
            }
            if (e.key === 'ArrowUp') { e.preventDefault();
                prevChannel(); return; }
            if (e.key === 'ArrowDown') { e.preventDefault();
                nextChannel(); return; }
            if (e.key === 'Escape') {
                if (settingsPanelLeft.classList.contains('open')) { closeSettingsPanel();
                    e.preventDefault(); return; }
                if (channelSidebar.classList.contains('open')) { closeSidebar();
                    e.preventDefault(); return; }
            }
            if (e.key === 's' || e.key === 'S') { e.preventDefault();
                toggleSettingsPanel(); return; }
            const num = parseInt(e.key);
            if (num >= 1 && num <= 9 && channels.length) {
                e.preventDefault();
                const idx = num - 1;
                if (idx < channels.length) switchChannel(idx);
            }
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  VISIBILITY CHANGE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && video.paused && hls &&
                !errorOverlay.classList.contains('visible') &&
                !loadingOverlay.classList.contains('visible') &&
                !fetchOverlay.classList.contains('visible') &&
                !fetchErrorOverlay.classList.contains('visible')) {
                video.play().then(() => { settingsPlayPauseBtn.textContent = '⏸'; }).catch(() => {});
            }
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function init() {
            if (isInitialized) return;
            isInitialized = true;
            applyFitMode('contain');
            fitModeBadge2.textContent = 'ফিট';
            fetchPlaylist();
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  GLOBAL CLICK SOUND FOR ANY BUTTON
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        document.addEventListener('click', (e) => {
            const target = e.target.closest('.control-btn, .btn, .close-sidebar-btn, .settings-close-btn');
            if (!target) return;
            const already = ['settingsToggleBtn', 'settingsCloseBtn', 'settingsPlayPauseBtn',
                'settingsMuteBtn', 'settingsAutoScanBtn', 'settingsFullscreenBtn', 'settingsFitCycleBtn',
                'prevChannelBtn', 'nextChannelBtn', 'channelListBtn', 'closeSidebarBtn',
                'retryBtn', 'fetchRetryBtn', 'useDefaultBtn'
            ];
            if (target.id && already.includes(target.id)) return;
            playClick();
            animatePress(target);
        });
    </script>

</body>
</html>
